<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 160" fill="none">
  <!-- Dark background -->
  <rect width="780" height="160" rx="24" fill="#1A1A1A"/>

  <!-- Mark (scaled to 120px tall, maintaining 500x500 proportion) -->
  <!-- Original mark viewBox: 500x500. Scale to 120px: factor = 120/500 = 0.24 -->
  <!-- Mark width at 120px height: 120px. Centered vertically: y offset = 20px -->
  <g transform="translate(20, 20) scale(0.24)">
    <!-- Left prong -->
    <path d="M 130,375 L 130,225 C 130,145 155,75 160,70 C 165,75 190,145 190,225 L 190,375 Z"
          fill="#E03E3E"/>
    <!-- Center prong -->
    <path d="M 220,375 L 220,205 C 220,115 245,45 250,40 C 255,45 280,115 280,205 L 280,375 Z"
          fill="#E03E3E"/>
    <!-- Right prong -->
    <path d="M 310,375 L 310,225 C 310,145 335,75 340,70 C 345,75 370,145 370,225 L 370,375 Z"
          fill="#E03E3E"/>
    <!-- Palm bar -->
    <rect x="80" y="362" width="340" height="68" rx="34" fill="#E03E3E"/>
  </g>

  <!-- Wordmark — positioned to the right of the mark -->
  <style>
    .lk { font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; font-size: 58px; }
    .lk-r { font-weight: 600; }
    .lk-b { font-weight: 700; }
  </style>
  <text y="98" class="lk">
    <tspan class="lk-r" fill="#F5F0EB" x="168">Open</tspan><tspan
          class="lk-b"  fill="#E03E3E">Claw</tspan><tspan
          class="lk-r"  fill="#F5F0EB">HQ</tspan>
  </text>
</svg>
