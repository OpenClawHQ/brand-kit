<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 108" fill="none">
  <!-- Light pill background — iOS-radius corners -->
  <rect width="440" height="108" rx="26" fill="#FAFAFA"/>

  <style>
    .wm { font-family: 'Inter', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; font-size: 56px; letter-spacing: -0.02em; }
    .wm-regular { font-weight: 600; }
    .wm-bold    { font-weight: 700; }
  </style>

  <!-- Text centered in viewBox: x=50%, y=50% -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="wm">
    <tspan class="wm-regular" fill="#1A1A1A">Open</tspan><tspan class="wm-bold" fill="#E03E3E">Claw</tspan><tspan class="wm-regular" fill="#1A1A1A">HQ</tspan>
  </text>
</svg>
