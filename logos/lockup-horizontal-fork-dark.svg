<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 160" fill="none">
  <!-- Dark background -->
  <rect width="780" height="160" rx="24" fill="#1A1A1A"/>

  <!-- Mark: GitHub-style fork icon, in OpenClaw red -->
  <!-- Source path is in a 24x24 coordinate system; scale to ~120px tall (24 * 5 = 120) -->
  <g transform="translate(24, 20) scale(5)">
    <path
      d="M8.75 19.25a3.25 3.25 0 1 1 6.5 0 3.25 3.25 0 0 1-6.5 0ZM15 4.75a3.25 3.25 0 1 1 6.5 0 3.25 3.25 0 0 1-6.5 0Zm-12.5 0a3.25 3.25 0 1 1 6.5 0 3.25 3.25 0 0 1-6.5 0ZM5.75 6.5a1.75 1.75 0 1 0-.001-3.501A1.75 1.75 0 0 0 5.75 6.5ZM12 21a1.75 1.75 0 1 0-.001-3.501A1.75 1.75 0 0 0 12 21Zm6.25-14.5a1.75 1.75 0 1 0-.001-3.501A1.75 1.75 0 0 0 18.25 6.5Z"
      fill="#E03E3E"
    />
  </g>

  <!-- Wordmark  positioned to the right of the mark -->
  <style>
    .lk { font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; font-size: 58px; }
    .lk-r { font-weight: 600; }
    .lk-b { font-weight: 700; }
  </style>
  <text y="98" class="lk">
    <tspan class="lk-r" fill="#F5F0EB" x="168">Open</tspan><tspan
          class="lk-b"  fill="#E03E3E">Claw</tspan><tspan
          class="lk-r"  fill="#F5F0EB">HQ</tspan>
  </text>
</svg>

