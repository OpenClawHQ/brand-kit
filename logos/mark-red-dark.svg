<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="64" fill="#1A1A1A"/>
  <g transform="translate(256, 256)">
    <!-- Three claw prongs -->
    <path d="M-80,-140 Q-80,-200 -40,-200 Q0,-200 0,-140 L0,-40"
          stroke="#E03E3E" stroke-width="32" stroke-linecap="round" fill="none"/>
    <path d="M0,-160 Q0,-220 40,-220 Q80,-220 80,-160 L80,-40"
          stroke="#E03E3E" stroke-width="32" stroke-linecap="round" fill="none"/>
    <path d="M80,-140 Q80,-200 120,-200 Q160,-200 160,-140 L160,-40"
          stroke="#E03E3E" stroke-width="32" stroke-linecap="round" fill="none"/>
    <!-- Palm arc -->
    <path d="M-80,-40 Q-80,80 40,80 Q160,80 160,-40"
          stroke="#E03E3E" stroke-width="32" stroke-linecap="round" fill="none"/>
  </g>
</svg>
