<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 108" fill="none">
  <!-- Dark pill — iOS-radius corners -->
  <rect width="440" height="108" rx="26" fill="#1A1A1A"/>

  <style>
    .wm { font-family: 'Inter', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; font-size: 56px; letter-spacing: -0.02em; }
    .wm-regular { font-weight: 600; }
    .wm-bold    { font-weight: 700; }
  </style>

  <!-- Text on Y-axis center (55% nudges down for optical balance) -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="wm">
    <tspan class="wm-regular" fill="#F5F0EB">effector</tspan><tspan class="wm-bold" fill="#E03E3E">HQ</tspan>
  </text>
</svg>
